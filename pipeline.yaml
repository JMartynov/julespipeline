settings:
  repo: "JMartynov/julespipeline"
  base_branch: "main"
  automation_mode: "AUTO_CREATE_PR"
  # How to handle merges: "auto" (gh merge), "jules" (use jules to merge/resolve), or "manual"
  merge_strategy: "jules"
prompts:
  review: |
    Review the changes in branch '{branch_name}' against the task: '{task_name}'.
    Task Description:
    {task_content}

    Instructions:
    1. Verify if all requirements from the task are implemented.
    2. If any parts are missing, implement them now.
    3. Run existing tests and add new tests to verify the feature.
    4. Ensure the code follows PEP 8 and project standards.
    5. Fix any bugs or issues found.
    6. Only open a PR if the feature is complete and tests pass.
  merge_resolve: |
    Merge the changes from '{head_branch}' into '{base_branch}'.
    If there are conflicts, resolve them gracefully:
    - DO NOT affect old functionality.
    - ENSURE new functionality is integrated correctly.
    - Run all tests to ensure no regressions were introduced.
tasks:
  - tasks/01_basic_math.md
  - tasks/02_string_parsing.md
  - tasks/03_float_support.md
  - tasks/04_advanced_math.md
  - tasks/05_history_tracking.md
  - tasks/06_cli_interface.md
  - tasks/07_export_json.md
  - tasks/08_import_json.md
  - tasks/09_logging.md
  - tasks/10_rest_api.md
