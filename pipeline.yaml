settings:
  repo: "JMartynov/julespipeline"
  base_branch: "main"
  # Merge strategy: "git" (direct merge) or "jules" (using jules to handle conflicts)
  merge_strategy: "jules"
  api_url: "https://jules.googleapis.com/v1alpha"
  polling_interval_seconds: 15
  source_prefix: "sources/github/"
prompts:
  task_start: |
    Implement the following task in the repository against the branch '{base_branch}'.
    Task Name: {task_name}
    
    Task Description:
    {task_content}

    General Instructions:
    1. Implement all requested features and logic.
    2. Add comprehensive unit and/or integration tests.
    3. Ensure existing tests still pass.
    4. Follow PEP 8 and project style guides.
  review: |
    Review the changes in branch '{branch_name}' against the task: '{task_name}'. 
    Task Description: "{task_content}"
    
    Instructions:
    1. Review how in this branch '{branch_name}' all mentioned in the task implemented.
    2. Add missing parts if not implemented.
    3. Run tests before making PR.
    4. Fix issues, then open PR.
  merge_resolve: |
    Merge the changes from '{head_branch}' into '{base_branch}'.
    If there are conflicts, resolve them gracefully:
    - DO NOT affect old functionality.
    - ENSURE new functionality is integrated correctly.
    - Run all tests to ensure no regressions were introduced.
tasks:
  - tasks/03_float_support.md
  - tasks/04_advanced_math.md
  - tasks/05_history_tracking.md
  - tasks/06_cli_interface.md
  - tasks/07_export_json.md
  - tasks/08_import_json.md
  - tasks/09_logging.md
  - tasks/10_rest_api.md
